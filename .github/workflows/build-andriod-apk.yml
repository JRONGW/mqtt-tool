name: Flutter Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ubuntu:22.04  # Start with clean Ubuntu
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          apt-get update
          apt-get install -y curl git unzip xz-utils zip libglu1-mesa openjdk-11-jdk wget
          
      - name: Install Flutter
        run: |
          # Download Flutter 3.22.0 (includes Dart 3.4+)
          wget https://storage.googleapis.com/flutter_infra_release/releases/stable/linux/flutter_linux_3.22.0-stable.tar.xz
          tar xf flutter_linux_3.22.0-stable.tar.xz
          echo "$(pwd)/flutter/bin" >> $GITHUB_PATH
          echo "$(pwd)/flutter/bin" >> ~/.bashrc
          
      - name: Verify Flutter Version
        run: |
          export PATH="$PATH:$(pwd)/flutter/bin"
          flutter --version
          dart --version
          
      - name: Accept Android Licenses
        run: |
          export PATH="$PATH:$(pwd)/flutter/bin"
          yes | flutter doctor --android-licenses
          
      - name: Build APK
        run: |
          export PATH="$PATH:$(pwd)/flutter/bin"
          flutter clean
          rm -f pubspec.lock
          flutter pub get
          flutter build apk --release
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
