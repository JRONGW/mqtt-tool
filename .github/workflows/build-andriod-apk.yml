name: Flutter Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'zulu'  # Better compatibility than 'microsoft'

      - name: Install Flutter (Forced Specific Version)
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.13.9'  # <- CRITICAL: Pin this exact version
          channel: 'stable'
          cache: false  # <- IMPORTANT: Disable cache to avoid the cached 'main' version

      - name: Verify Flutter Version
        run: flutter --version  # This will confirm the correct version is used

      - name: Update Gradle files for compatibility
        run: |
          # Update build.gradle
          cat > android/build.gradle << 'EOF'
          buildscript {
              ext.kotlin_version = '1.9.0'
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:7.3.0'
                  classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
              }
          }
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.buildDir = '../build'
          subprojects {
              project.buildDir = "\${rootProject.buildDir}/\${project.name}"
          }
          subprojects {
              project.evaluationDependsOn(':app')
          }
          tasks.register("clean", Delete) {
              delete rootProject.buildDir
          }
          EOF
          
          # Update gradle wrapper
          cat > android/gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-7.5-all.zip
          EOF

      - name: Clean and get dependencies
        run: |
          flutter clean
          rm -rf ~/.gradle/caches/  # Clear global Gradle cache
          cd android && ./gradlew clean && rm -rf .gradle && cd ..
          flutter pub get

      - name: Build APK Release
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
