name: Flutter Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'zulu'

      # COMPLETELY NUKE ANY EXISTING FLUTTER INSTALLATION
      - name: Remove existing Flutter
        run: |
          sudo rm -rf /opt/hostedtoolcache/flutter
          rm -rf ~/.flutter
          rm -rf ~/.pub-cache

      # INSTALL FLUTTER MANUALLY (MOST RELIABLE METHOD)
      - name: Install Flutter Manually
        run: |
          # Download and extract specific Flutter version
          wget https://storage.googleapis.com/flutter_infra_release/releases/stable/linux/flutter_linux_3.19.6-stable.tar.xz
          tar xf flutter_linux_3.19.6-stable.tar.xz
          echo "$(pwd)/flutter/bin" >> $GITHUB_PATH
          
      - name: Verify Flutter Version
        run: |
          flutter --version
          dart --version
          which flutter
          which dart

      - name: Update Gradle files
        run: |
          # Update build.gradle
          cat > android/build.gradle << 'EOF'
          buildscript {
              ext.kotlin_version = '1.9.0'
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:7.3.0'
                  classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
              }
          }
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.buildDir = '../build'
          subprojects {
              project.buildDir = "\${rootProject.buildDir}/\${project.name}"
          }
          subprojects {
              project.evaluationDependsOn(':app')
          }
          tasks.register("clean", Delete) {
              delete rootProject.buildDir
          }
          EOF
          
          # Update gradle wrapper
          cat > android/gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-7.5-all.zip
          EOF

      - name: Clean and Prepare
        run: |
          # Remove lock file
          rm -f pubspec.lock
          
          # Clean everything
          flutter clean
          
          # Setup Android
          cd android
          flutter build apk --release  # This generates gradlew
          chmod +x ./gradlew
          ./gradlew clean
          cd ..

      - name: Get Dependencies
        run: flutter pub get

      - name: Build APK Release
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
