name: Flutter Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4  # Updated to v4

      - name: Set up JDK
        uses: actions/setup-java@v4  # Updated to v4
        with:
          java-version: '11'
          distribution: 'zulu'

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'  # Latest stable in 3.19.x series
          channel: 'stable'
          cache: true  # Enable cache for faster builds

      - name: Verify Flutter Version
        run: |
          flutter --version
          dart --version  # This will confirm Dart version

      - name: Update Gradle files
        run: |
          # Update build.gradle
          cat > android/build.gradle << 'EOF'
          buildscript {
              ext.kotlin_version = '1.9.0'
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:7.3.0'
                  classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
              }
          }
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.buildDir = '../build'
          subprojects {
              project.buildDir = "\${rootProject.buildDir}/\${project.name}"
          }
          subprojects {
              project.evaluationDependsOn(':app')
          }
          tasks.register("clean", Delete) {
              delete rootProject.buildDir
          }
          EOF
          
          # Update gradle wrapper
          cat > android/gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-7.5-all.zip
          EOF

      - name: Clean and Prepare
        run: |
          # Remove any existing lock file to force fresh resolution
          rm -f pubspec.lock
          
          # Clean Flutter
          flutter clean
          
          # Clean Android with proper path handling
          cd android
          if [ -f "./gradlew" ]; then
            chmod +x ./gradlew
            ./gradlew clean
            rm -rf .gradle
          else
            echo "gradlew not found, creating it..."
            flutter build apk --release  # This will generate gradlew
          fi
          cd ..

      - name: Get Dependencies
        run: flutter pub get

      - name: Build APK Release
        run: flutter build apk --release --verbose  # Verbose for debugging

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
